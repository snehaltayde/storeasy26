<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · BeastLife</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0b;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      .wrap { padding: 2rem; }
      .brand { color: #a3e635; font-weight: 800; letter-spacing: 0.02em; }
      h1 { font-size: 1.5rem; margin: 0.75rem 0 0.5rem; }
      p { color: #a1a1aa; margin: 0; }
      button {
        margin-top: 1.5rem;
        background: #a3e635;
        color: #0a0a0b;
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1.5rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="brand">BEASTLIFE</p>
      <h1>You're offline</h1>
      <p>Reconnect to keep browsing the catalog.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
